# DeployFlow Configuration File

# Set to 1 to enable auto Git Commit & Push, 0 to disable
git_enabled = 1

# Branch name to push to (default is main)
git_branch = main

# Custom commit message. Leave blank to auto-generate a timestamp message
commit_message = Auto deploy: updated project files

# Build command (e.g. npm run build, gulp, webpack, maven, dotnet build etc.)
# Comment out or leave blank if none
build_command = npm run build

# Deploy command (e.g. firebase deploy, vercel --prod, scp -r ./dist user@host:/var/www/html)
# Comment out or leave blank if none
deploy_command = firebase deploy

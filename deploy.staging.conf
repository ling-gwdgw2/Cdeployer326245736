# DeployFlow Configuration File - STAGING

# Set to 1 to enable auto Git Commit & Push, 0 to disable
git_enabled = 0

# Branch name to push to
git_branch = staging

# Custom commit message
commit_message = Auto deploy: staging build

# Build command (set to 'auto' to auto-detect, or specify command, leave blank if none)
build_command = auto

# Deploy command (set to 'auto' to auto-detect, or specify command, leave blank if none)
deploy_command = echo "DEPLOYING TO STAGING SERVER..."
